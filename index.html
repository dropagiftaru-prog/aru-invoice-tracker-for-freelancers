<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Invoice Tracker · Freelancer</title>
    <style>
        /* ----- CSS custom properties (theming) ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg: #f6f8fa;
            --color-surface: #ffffff;
            --color-text: #1e293b;
            --color-text-soft: #64748b;
            --color-border: #e2e8f0;
            --color-primary: #2563eb;
            --color-primary-hover: #1d4ed8;
            --color-paid: #16a34a;
            --color-paid-bg: #e6f7ec;
            --color-unpaid: #b45309;
            --color-unpaid-bg: #fef3e2;
            --color-delete: #dc2626;
            --color-delete-hover: #b91c1c;
            --radius-card: 1rem;
            --radius-sm: 0.5rem;
            --shadow-card: 0 4px 12px rgba(0, 0, 0, 0.04);
            --font-stack: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            --transition: 0.2s ease;
        }

        body {
            font-family: var(--font-stack);
            background: var(--color-bg);
            color: var(--color-text);
            padding: 1.25rem 1rem 3rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* main container – max width for readability */
        .app {
            width: 100%;
            max-width: 960px;
        }

        /* ----- typography & spacing ----- */
        header {
            margin-bottom: 1.75rem;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        h1 small {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--color-text-soft);
            margin-left: 0.5rem;
        }

        .total-outstanding {
            background: var(--color-surface);
            border-radius: var(--radius-card);
            padding: 1.25rem 1.5rem;
            box-shadow: var(--shadow-card);
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            border: 1px solid var(--color-border);
        }

        .total-outstanding span:first-child {
            font-weight: 500;
            color: var(--color-text-soft);
            font-size: 1rem;
        }

        .total-outstanding .amount {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--color-text);
            letter-spacing: -0.02em;
        }

        .total-outstanding .amount::before {
            content: '$';
            font-size: 1.4rem;
            font-weight: 500;
            margin-right: 0.1rem;
            opacity: 0.7;
        }

        /* ----- form card ----- */
        .form-card {
            background: var(--color-surface);
            border-radius: var(--radius-card);
            padding: 1.5rem 1.25rem;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--color-border);
            margin-bottom: 2rem;
        }

        .form-card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
        }

        .invoice-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .form-row label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--color-text-soft);
        }

        .form-row input {
            font-family: var(--font-stack);
            font-size: 1rem;
            padding: 0.7rem 0.9rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            background: var(--color-bg);
            transition: border var(--transition), box-shadow var(--transition);
        }

        .form-row input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .form-row-inline {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.75rem 1.5rem;
            padding: 0.25rem 0;
        }

        .toggle-wrapper {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .toggle-wrapper label {
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            user-select: none;
        }

        /* custom toggle switch */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 3rem;
            height: 1.7rem;
            background: #cbd5e1;
            border-radius: 2rem;
            transition: background var(--transition);
            cursor: pointer;
            flex-shrink: 0;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 0.2rem;
            left: 0.2rem;
            width: 1.3rem;
            height: 1.3rem;
            background: white;
            border-radius: 50%;
            transition: transform var(--transition);
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
        }

        .toggle-switch.active {
            background: var(--color-paid);
        }

        .toggle-switch.active::after {
            transform: translateX(1.3rem);
        }

        .toggle-status-text {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--color-text-soft);
            min-width: 3.5rem;
        }

        .btn {
            font-family: var(--font-stack);
            font-weight: 600;
            font-size: 1rem;
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: var(--radius-sm);
            background: var(--color-primary);
            color: white;
            cursor: pointer;
            transition: background var(--transition), transform 0.1s;
            align-self: flex-start;
        }

        .btn:hover {
            background: var(--color-primary-hover);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .validation-message {
            font-size: 0.8rem;
            color: var(--color-delete);
            min-height: 1.2rem;
            margin-top: 0.2rem;
        }

        /* ----- invoice list / table ----- */
        .list-section h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .empty-state {
            background: var(--color-surface);
            border-radius: var(--radius-card);
            padding: 2.5rem 1.5rem;
            text-align: center;
            color: var(--color-text-soft);
            border: 1px dashed var(--color-border);
            font-size: 1rem;
        }

        /* card layout for mobile */
        .invoice-cards {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .invoice-card {
            background: var(--color-surface);
            border-radius: var(--radius-card);
            padding: 1rem 1.25rem;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--color-border);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.75rem 1rem;
            transition: box-shadow var(--transition), border-color var(--transition);
        }

        .invoice-card .card-main {
            flex: 2 1 180px;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .invoice-card .client-name {
            font-weight: 600;
            font-size: 1.05rem;
        }

        .invoice-card .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1.2rem;
            font-size: 0.85rem;
            color: var(--color-text-soft);
        }

        .invoice-card .amount {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .invoice-card .actions {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-left: auto;
            flex-wrap: wrap;
        }

        .status-badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            transition: background var(--transition), color var(--transition);
        }

        .status-badge.paid {
            background: var(--color-paid-bg);
            color: var(--color-paid);
        }

        .status-badge.unpaid {
            background: var(--color-unpaid-bg);
            color: var(--color-unpaid);
        }

        .btn-small {
            font-family: var(--font-stack);
            font-size: 0.8rem;
            font-weight: 500;
            padding: 0.3rem 0.9rem;
            border: none;
            border-radius: 2rem;
            background: var(--color-border);
            color: var(--color-text);
            cursor: pointer;
            transition: background var(--transition), opacity var(--transition);
        }

        .btn-small:hover {
            opacity: 0.8;
        }

        .btn-small.toggle-btn {
            background: var(--color-primary);
            color: white;
        }

        .btn-small.toggle-btn.paid {
            background: var(--color-paid);
        }

        .btn-small.delete-btn {
            background: transparent;
            color: var(--color-delete);
            border: 1px solid var(--color-delete);
        }

        .btn-small.delete-btn:hover {
            background: var(--color-delete);
            color: white;
        }

        /* desktop table (hidden on small) */
        .desktop-table {
            display: none;
        }

        /* ----- responsive: table on wider screens ----- */
        @media (min-width: 700px) {
            .invoice-cards {
                display: none;
            }

            .desktop-table {
                display: block;
                background: var(--color-surface);
                border-radius: var(--radius-card);
                border: 1px solid var(--color-border);
                overflow-x: auto;
                box-shadow: var(--shadow-card);
            }

            .desktop-table table {
                width: 100%;
                border-collapse: collapse;
                font-size: 0.95rem;
            }

            .desktop-table th {
                text-align: left;
                padding: 0.9rem 1rem;
                background: #f1f5f9;
                font-weight: 600;
                color: var(--color-text-soft);
                border-bottom: 1px solid var(--color-border);
            }

            .desktop-table td {
                padding: 0.9rem 1rem;
                border-bottom: 1px solid var(--color-border);
                vertical-align: middle;
            }

            .desktop-table tr:last-child td {
                border-bottom: none;
            }

            .desktop-table .actions-cell {
                display: flex;
                gap: 0.5rem;
                flex-wrap: wrap;
            }

            .desktop-table .status-badge {
                display: inline-block;
            }
        }

        /* small touches */
        hr {
            border: none;
            border-top: 1px solid var(--color-border);
            margin: 0.5rem 0;
        }

        .footer-note {
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: var(--color-text-soft);
            text-align: center;
        }
    </style>
